<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>هامور البحر - الميناء</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main id="game-shell">
      <div id="game"></div>

      <section id="hud" aria-label="واجهة الميناء">
        <div class="top-hud">
          <div class="currency-card"><span>العملات</span><strong id="coins">0</strong></div>
          <div class="currency-card gems"><span>الجواهر</span><strong id="gems">0</strong></div>
          <button id="menu-btn" class="asset-button">القائمة</button>
        </div>

        <div id="prompt" class="prompt"></div>
        <div id="toast" class="toast" role="status" aria-live="polite"></div>

        <div id="menu-modal" class="modal hidden" role="dialog" aria-modal="true">
          <div class="modal-card">
            <h1 id="modal-title">القائمة</h1>
            <p id="modal-body">مرحبًا بك في ميناء هامور البحر.</p>
            <button id="modal-close" class="asset-button red">إغلاق</button>
          </div>
        </div>

        <div class="mobile-pad" aria-label="تحكم الجوال">
          <button data-dir="up">▲</button>
          <div>
            <button data-dir="right">▶</button>
            <button data-dir="down">▼</button>
            <button data-dir="left">◀</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./vendor/phaser.min.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
